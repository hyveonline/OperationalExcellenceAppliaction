<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Zone Team Configuration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #f0f2f5;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #8e24aa 0%, #6a1b9a 100%);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { 
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            opacity: 0.9;
            transition: opacity 0.3s;
        }
        .header-nav a:hover { opacity: 1; }
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 30px 20px; 
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 12px 24px;
            background: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
        }
        .tab:hover { background: #e0e0e0; }
        .tab.active {
            background: #8e24aa;
            color: white;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #8e24aa;
            color: white;
        }
        .btn-primary:hover { background: #7b1fa2; }
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        .btn-secondary:hover { background: #d0d0d0; }
        .btn-danger {
            background: #ef5350;
            color: white;
        }
        .btn-danger:hover { background: #e53935; }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        /* Schedule Grid */
        .schedule-grid {
            overflow-x: auto;
        }
        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }
        .schedule-table th, .schedule-table td {
            border: 1px solid #e0e0e0;
            padding: 12px;
            text-align: left;
        }
        .schedule-table th {
            background: #f5f5f5;
            font-weight: 600;
            color: #333;
        }
        .schedule-table th.time-slot {
            background: #8e24aa;
            color: white;
            text-align: center;
            min-width: 150px;
        }
        .schedule-table th.break-slot {
            background: #ff9800;
            color: white;
        }
        .zone-name {
            font-weight: 600;
            color: #8e24aa;
        }
        .task-cell {
            position: relative;
        }
        .task-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
        }
        .task-input:focus {
            outline: none;
            border-color: #8e24aa;
        }
        .task-cell.break {
            background: #fff3e0;
            text-align: center;
            color: #ff9800;
            font-weight: 500;
        }
        .save-indicator {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: #4caf50;
            display: none;
        }
        
        /* Zones List */
        .zones-list {
            display: grid;
            gap: 15px;
        }
        .zone-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #f9f9f9;
            border-radius: 10px;
            border-left: 4px solid #8e24aa;
        }
        .zone-info h3 {
            color: #333;
            margin-bottom: 5px;
        }
        .zone-info p {
            color: #666;
            font-size: 13px;
        }
        .zone-actions {
            display: flex;
            gap: 10px;
        }
        .agent-count {
            background: #8e24aa;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
        
        /* Agent Assignment */
        .agents-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #ddd;
        }
        .agents-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .agent-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #e8f5e9;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
        }
        .agent-tag .remove-agent {
            cursor: pointer;
            color: #c62828;
            font-weight: bold;
        }
        .agent-tag .remove-agent:hover {
            color: #b71c1c;
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 {
            margin-bottom: 20px;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #8e24aa;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #4caf50;
            color: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transform: translateX(150%);
            transition: transform 0.3s;
            z-index: 2000;
        }
        .toast.show { transform: translateX(0); }
        .toast.error { background: #ef5350; }

        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔄 Multi-Zone Team Configuration</h1>
        <div class="header-nav">
            <a href="/security/daily-tasks">📋 Fill Tasks</a>
            <a href="/security">← Back to Security</a>
        </div>
    </div>
    
    <div class="container">
        <div class="tabs">
            <button class="tab active" data-tab="schedule">📅 Schedule Matrix</button>
            <button class="tab" data-tab="zones">🏢 Manage Zones</button>
            <button class="tab" data-tab="agents">👤 Agent Assignments</button>
        </div>
        
        <!-- Schedule Matrix Tab -->
        <div id="schedule-tab" class="tab-content active">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">Weekly Schedule (4 Agents)</div>
                    <div>
                        <span style="color: #666; font-size: 13px;">Click on any cell to edit the task description</span>
                    </div>
                </div>
                <div class="schedule-grid">
                    <table class="schedule-table" id="scheduleTable">
                        <thead>
                            <tr>
                                <th>Zone</th>
                                <!-- Time slots will be dynamically added -->
                            </tr>
                        </thead>
                        <tbody id="scheduleBody">
                            <!-- Schedule rows will be dynamically added -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- Zones Tab -->
        <div id="zones-tab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">Multi-Zone Areas</div>
                    <button class="btn btn-primary" onclick="openAddZoneModal()">+ Add Zone</button>
                </div>
                <div class="zones-list" id="zonesList">
                    <!-- Zones will be dynamically added -->
                </div>
            </div>
        </div>
        
        <!-- Agents Tab -->
        <div id="agents-tab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">Agent Assignments</div>
                    <span style="color: #666; font-size: 13px;">Assign cleaners to each zone</span>
                </div>
                <div class="zones-list" id="agentZonesList">
                    <!-- Zones with agent assignments will be dynamically added -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Add/Edit Zone Modal -->
    <div class="modal-overlay" id="zoneModal">
        <div class="modal">
            <h2 id="zoneModalTitle">Add Zone</h2>
            <form id="zoneForm">
                <input type="hidden" id="zoneId">
                <div class="form-group">
                    <label>Zone Name *</label>
                    <input type="text" id="zoneName" required placeholder="e.g., Finance, HR, Commercial">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="zoneDescription" rows="3" placeholder="Optional description"></textarea>
                </div>
                <div class="form-group">
                    <label>Agent Count</label>
                    <input type="number" id="zoneAgentCount" value="1" min="1" max="10">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeZoneModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Zone</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Add Agent Modal -->
    <div class="modal-overlay" id="agentModal">
        <div class="modal">
            <h2>Assign Agent to <span id="agentZoneName"></span></h2>
            <form id="agentForm">
                <input type="hidden" id="agentZoneId">
                <div class="form-group">
                    <label>Select Agent *</label>
                    <select id="agentSelect" required>
                        <option value="">-- Select Agent --</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeAgentModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Assign Agent</button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        let zones = [];
        let timeSlots = [];
        let schedule = [];
        let users = [];
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
            });
        });
        
        // Load initial data
        async function loadData() {
            try {
                const [zonesRes, slotsRes, scheduleRes, usersRes] = await Promise.all([
                    fetch('/security/multizone-team/api/zones'),
                    fetch('/security/multizone-team/api/timeslots'),
                    fetch('/security/multizone-team/api/schedule'),
                    fetch('/security/multizone-team/api/users')
                ]);
                
                zones = await zonesRes.json();
                timeSlots = await slotsRes.json();
                schedule = await scheduleRes.json();
                users = await usersRes.json();
                
                renderSchedule();
                renderZones();
                renderAgentAssignments();
                populateAgentSelect();
            } catch (err) {
                console.error('Error loading data:', err);
                showToast('Error loading data', true);
            }
        }
        
        // Render schedule matrix
        function renderSchedule() {
            const thead = document.querySelector('#scheduleTable thead tr');
            const tbody = document.getElementById('scheduleBody');
            
            // Clear and rebuild header
            thead.innerHTML = '<th>Zone</th>';
            timeSlots.forEach(slot => {
                const th = document.createElement('th');
                th.className = slot.IsBreak ? 'time-slot break-slot' : 'time-slot';
                th.textContent = slot.SlotName;
                thead.appendChild(th);
            });
            
            // Group schedule by zone
            const zoneSchedule = {};
            schedule.forEach(item => {
                if (!zoneSchedule[item.ZoneId]) {
                    zoneSchedule[item.ZoneId] = { name: item.ZoneName, slots: {} };
                }
                zoneSchedule[item.ZoneId].slots[item.TimeSlotId] = item.TaskDescription;
            });
            
            // Build rows
            tbody.innerHTML = '';
            zones.forEach(zone => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="zone-name">${zone.ZoneName}</td>`;
                
                timeSlots.forEach(slot => {
                    const td = document.createElement('td');
                    td.className = 'task-cell' + (slot.IsBreak ? ' break' : '');
                    
                    if (slot.IsBreak) {
                        td.textContent = 'Break';
                    } else {
                        const taskDesc = zoneSchedule[zone.Id]?.slots[slot.Id] || '';
                        td.innerHTML = `
                            <input type="text" class="task-input" 
                                value="${taskDesc}" 
                                data-zone="${zone.Id}" 
                                data-slot="${slot.Id}"
                                placeholder="Enter task...">
                            <span class="save-indicator">✓</span>
                        `;
                    }
                    tr.appendChild(td);
                });
                
                tbody.appendChild(tr);
            });
            
            // Add blur event listeners for auto-save
            document.querySelectorAll('.task-input').forEach(input => {
                input.addEventListener('blur', saveTask);
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.target.blur();
                    }
                });
            });
        }
        
        // Save task on blur
        async function saveTask(e) {
            const input = e.target;
            const zoneId = input.dataset.zone;
            const slotId = input.dataset.slot;
            const taskDescription = input.value;
            
            try {
                const res = await fetch('/security/multizone-team/api/schedule/task', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ zoneId, timeSlotId: slotId, taskDescription })
                });
                
                if (res.ok) {
                    const indicator = input.nextElementSibling;
                    indicator.style.display = 'inline';
                    setTimeout(() => indicator.style.display = 'none', 1500);
                }
            } catch (err) {
                console.error('Error saving task:', err);
                showToast('Error saving task', true);
            }
        }
        
        // Render zones list
        function renderZones() {
            const container = document.getElementById('zonesList');
            container.innerHTML = zones.map(zone => `
                <div class="zone-item">
                    <div class="zone-info">
                        <h3>${zone.ZoneName} <span class="agent-count">${zone.AgentCount} Agent(s)</span></h3>
                        <p>${zone.ZoneDescription || 'No description'}</p>
                    </div>
                    <div class="zone-actions">
                        <button class="btn btn-secondary btn-sm" onclick="editZone(${zone.Id})">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteZone(${zone.Id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Render agent assignments
        async function renderAgentAssignments() {
            const container = document.getElementById('agentZonesList');
            
            let html = '';
            for (const zone of zones) {
                // Fetch agents for this zone
                const res = await fetch(`/security/multizone-team/api/zones/${zone.Id}/agents`);
                const agents = await res.json();
                
                html += `
                    <div class="zone-item">
                        <div class="zone-info" style="flex: 1;">
                            <h3>${zone.ZoneName} 
                                <span class="agent-count">${agents.length}/${zone.AgentCount} Assigned</span>
                            </h3>
                            <div class="agents-section">
                                <div class="agents-list">
                                    ${agents.map(a => `
                                        <span class="agent-tag">
                                            ${a.DisplayName}
                                            <span class="remove-agent" onclick="removeAgent(${zone.Id}, ${a.UserId})">×</span>
                                        </span>
                                    `).join('')}
                                    ${agents.length === 0 ? '<span style="color: #999;">No agents assigned</span>' : ''}
                                </div>
                            </div>
                        </div>
                        <div class="zone-actions">
                            <button class="btn btn-primary btn-sm" onclick="openAgentModal(${zone.Id}, '${zone.ZoneName}')">+ Add Agent</button>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        // Populate agent select dropdown
        function populateAgentSelect() {
            const select = document.getElementById('agentSelect');
            select.innerHTML = '<option value="">-- Select Agent --</option>' +
                users.map(u => `<option value="${u.Id}">${u.DisplayName} (${u.Email})</option>`).join('');
        }
        
        // Zone Modal
        function openAddZoneModal() {
            document.getElementById('zoneModalTitle').textContent = 'Add Zone';
            document.getElementById('zoneId').value = '';
            document.getElementById('zoneName').value = '';
            document.getElementById('zoneDescription').value = '';
            document.getElementById('zoneAgentCount').value = '1';
            document.getElementById('zoneModal').classList.add('active');
        }
        
        function editZone(id) {
            const zone = zones.find(z => z.Id === id);
            if (!zone) return;
            
            document.getElementById('zoneModalTitle').textContent = 'Edit Zone';
            document.getElementById('zoneId').value = zone.Id;
            document.getElementById('zoneName').value = zone.ZoneName;
            document.getElementById('zoneDescription').value = zone.ZoneDescription || '';
            document.getElementById('zoneAgentCount').value = zone.AgentCount;
            document.getElementById('zoneModal').classList.add('active');
        }
        
        function closeZoneModal() {
            document.getElementById('zoneModal').classList.remove('active');
        }
        
        document.getElementById('zoneForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('zoneId').value;
            const data = {
                zoneName: document.getElementById('zoneName').value,
                zoneDescription: document.getElementById('zoneDescription').value,
                agentCount: parseInt(document.getElementById('zoneAgentCount').value)
            };
            
            try {
                const url = id ? `/security/multizone-team/api/zones/${id}` : '/security/multizone-team/api/zones';
                const method = id ? 'PUT' : 'POST';
                
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    showToast(id ? 'Zone updated' : 'Zone added');
                    closeZoneModal();
                    loadData();
                } else {
                    const err = await res.json();
                    showToast(err.error || 'Error saving zone', true);
                }
            } catch (err) {
                console.error('Error:', err);
                showToast('Error saving zone', true);
            }
        });
        
        async function deleteZone(id) {
            if (!confirm('Are you sure you want to delete this zone?')) return;
            
            try {
                const res = await fetch(`/security/multizone-team/api/zones/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast('Zone deleted');
                    loadData();
                }
            } catch (err) {
                console.error('Error:', err);
                showToast('Error deleting zone', true);
            }
        }
        
        // Agent Modal
        function openAgentModal(zoneId, zoneName) {
            document.getElementById('agentZoneId').value = zoneId;
            document.getElementById('agentZoneName').textContent = zoneName;
            document.getElementById('agentSelect').value = '';
            document.getElementById('agentModal').classList.add('active');
        }
        
        function closeAgentModal() {
            document.getElementById('agentModal').classList.remove('active');
        }
        
        document.getElementById('agentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const zoneId = document.getElementById('agentZoneId').value;
            const userId = document.getElementById('agentSelect').value;
            
            try {
                const res = await fetch(`/security/multizone-team/api/zones/${zoneId}/agents`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId })
                });
                
                if (res.ok) {
                    showToast('Agent assigned');
                    closeAgentModal();
                    renderAgentAssignments();
                } else {
                    const err = await res.json();
                    showToast(err.error || 'Error assigning agent', true);
                }
            } catch (err) {
                console.error('Error:', err);
                showToast('Error assigning agent', true);
            }
        });
        
        async function removeAgent(zoneId, userId) {
            if (!confirm('Remove this agent from the zone?')) return;
            
            try {
                const res = await fetch(`/security/multizone-team/api/zones/${zoneId}/agents/${userId}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast('Agent removed');
                    renderAgentAssignments();
                }
            } catch (err) {
                console.error('Error:', err);
                showToast('Error removing agent', true);
            }
        }
        
        // Toast notification
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Initialize
        loadData();
    </script>
</body>
</html>

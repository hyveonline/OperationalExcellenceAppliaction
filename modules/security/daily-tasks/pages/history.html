<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Tasks - History</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #f0f2f5;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { 
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            opacity: 0.9;
            transition: opacity 0.3s;
        }
        .header-nav a:hover { opacity: 1; }
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 30px 20px; 
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        /* Filter Row */
        .filter-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-row select, .filter-row input {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .filter-row select:focus, .filter-row input:focus {
            outline: none;
            border-color: #1976d2;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #1976d2;
            color: white;
        }
        .btn-primary:hover { background: #1565c0; }
        .btn-success {
            background: #4caf50;
            color: white;
        }
        .btn-success:hover { background: #43a047; }
        
        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background: #f5f5f5;
            font-weight: 600;
            color: #333;
        }
        tr:hover {
            background: #f9f9f9;
        }
        
        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-multizone {
            background: #f3e5f5;
            color: #8e24aa;
        }
        .badge-fixedarea {
            background: #e0f2f1;
            color: #00897b;
        }
        .progress-bar {
            width: 100px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            display: inline-block;
            margin-right: 10px;
        }
        .progress-fill {
            height: 100%;
            background: #4caf50;
            border-radius: 4px;
        }
        .progress-text {
            font-size: 13px;
            color: #666;
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        .empty-state h3 {
            margin-bottom: 10px;
            color: #333;
        }
        
        /* Action buttons */
        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .action-btn.view {
            background: #e3f2fd;
            color: #1976d2;
        }
        .action-btn.view:hover {
            background: #bbdefb;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Daily Tasks History</h1>
        <div class="header-nav">
            <a href="/security/daily-tasks">📋 Fill Tasks</a>
            <a href="/security">← Back to Security</a>
        </div>
    </div>
    
    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="card-title">Task Submissions</div>
                <a href="/security/daily-tasks" class="btn btn-success">+ New Entry</a>
            </div>
            
            <div class="filter-row">
                <select id="teamTypeFilter">
                    <option value="">All Team Types</option>
                    <option value="1">Multi-Zone Team</option>
                    <option value="2">Fixed Area Team</option>
                </select>
                <select id="zoneFilter">
                    <option value="">All Zones</option>
                </select>
                <input type="date" id="dateFromFilter" placeholder="From Date">
                <input type="date" id="dateToFilter" placeholder="To Date">
                <button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
            </div>
            
            <table id="entriesTable">
                <thead>
                    <tr>
                        <th>Zone</th>
                        <th>Team Type</th>
                        <th>Date Range</th>
                        <th>Progress</th>
                        <th>Created By</th>
                        <th>Created At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="entriesBody">
                    <tr>
                        <td colspan="7" class="empty-state">
                            <h3>Loading...</h3>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        let zones = [];
        
        // Initialize
        async function init() {
            await loadZones();
            await loadEntries();
        }
        
        // Load zones for filter
        async function loadZones() {
            try {
                const res = await fetch('/security/daily-tasks/api/zones');
                zones = await res.json();
                
                const select = document.getElementById('zoneFilter');
                select.innerHTML = '<option value="">All Zones</option>' +
                    zones.map(z => `<option value="${z.ZoneId}">${z.ZoneName} (${z.TeamTypeName})</option>`).join('');
            } catch (err) {
                console.error('Error loading zones:', err);
            }
        }
        
        // Load entries
        async function loadEntries() {
            const teamTypeId = document.getElementById('teamTypeFilter').value;
            const zoneId = document.getElementById('zoneFilter').value;
            const dateFrom = document.getElementById('dateFromFilter').value;
            const dateTo = document.getElementById('dateToFilter').value;
            
            let url = '/security/daily-tasks/api/entries?';
            if (teamTypeId) url += `teamTypeId=${teamTypeId}&`;
            if (zoneId) url += `zoneId=${zoneId}&`;
            if (dateFrom) url += `dateFrom=${dateFrom}&`;
            if (dateTo) url += `dateTo=${dateTo}&`;
            
            try {
                const res = await fetch(url);
                const entries = await res.json();
                
                const tbody = document.getElementById('entriesBody');
                
                if (entries.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7" class="empty-state">
                                <h3>No entries found</h3>
                                <p>No task submissions match your filters.</p>
                            </td>
                        </tr>
                    `;
                    return;
                }
                
                tbody.innerHTML = entries.map(entry => {
                    const progress = entry.TotalTasks > 0 ? Math.round((entry.CompletedTasks / entry.TotalTasks) * 100) : 0;
                    const badgeClass = entry.TeamTypeId === 1 ? 'badge-multizone' : 'badge-fixedarea';
                    
                    return `
                        <tr>
                            <td><strong>${entry.ZoneName}</strong></td>
                            <td><span class="badge ${badgeClass}">${entry.TeamTypeName}</span></td>
                            <td>${formatDate(entry.DateFrom)} - ${formatDate(entry.DateTo)}</td>
                            <td>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${progress}%"></div>
                                </div>
                                <span class="progress-text">${entry.CompletedTasks}/${entry.TotalTasks} (${progress}%)</span>
                            </td>
                            <td>${entry.CreatedByName || '-'}</td>
                            <td>${formatDateTime(entry.CreatedAt)}</td>
                            <td>
                                <button class="action-btn view" onclick="viewEntry(${entry.ZoneId}, '${entry.DateFrom.split('T')[0]}', '${entry.DateTo.split('T')[0]}')">
                                    View/Edit
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
                
            } catch (err) {
                console.error('Error loading entries:', err);
            }
        }
        
        // Apply filters
        function applyFilters() {
            loadEntries();
        }
        
        // View/Edit entry
        function viewEntry(zoneId, dateFrom, dateTo) {
            // Find zone info
            const zone = zones.find(z => z.ZoneId === zoneId);
            if (!zone) return;
            
            // Redirect to fill form with pre-selected values
            const url = `/security/daily-tasks?zone=${zoneId}&from=${dateFrom}&to=${dateTo}`;
            window.location.href = url;
        }
        
        // Format date
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString('en-GB', { 
                day: 'numeric', month: 'short', year: 'numeric'
            });
        }
        
        // Format datetime
        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleString('en-GB', { 
                day: 'numeric', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }
        
        // Initialize
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Audit - Receiving Audit System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 16px;
        }

        /* Main Card */
        .main-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 25px 30px;
            text-align: center;
        }

        .card-header h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .card-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .card-body {
            padding: 30px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group label .required {
            color: #ef4444;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            background: #fafafa;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            background: white;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Store Info Box */
        .store-info {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border: 2px solid #667eea;
            border-radius: 12px;
            padding: 15px 20px;
            margin-top: 10px;
            display: none;
        }

        .store-info.show {
            display: block;
        }

        .store-info-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 14px;
        }

        .store-info-item .label {
            color: #666;
        }

        .store-info-item .value {
            font-weight: 600;
            color: #333;
        }

        .schema-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
        }

        .cycle-badge {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }
        
        .cycle-badge.pending {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }
        
        .cycle-badge.completed {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        /* Buttons */
        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        /* Footer */
        .card-footer {
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        /* Loading */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-overlay.show {
            display: flex;
        }

        .loading-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1001;
            animation: slideIn 0.3s;
        }

        .toast.show {
            display: flex;
        }

        .toast.success {
            border-left: 4px solid #3b82f6;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Multi-Select Dropdown for Auditors */
        .multi-select-container {
            position: relative;
        }

        .multi-select-trigger {
            width: 100%;
            min-height: 45px;
            padding: 8px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            transition: border-color 0.2s;
        }

        .multi-select-trigger:hover,
        .multi-select-trigger:focus {
            border-color: #3b82f6;
            outline: none;
        }

        .multi-select-trigger .placeholder {
            color: #94a3b8;
        }

        .selected-tag {
            background: linear-gradient(135deg, #3b82f6, #667eea);
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .selected-tag .remove-tag {
            cursor: pointer;
            font-weight: bold;
            opacity: 0.8;
        }

        .selected-tag .remove-tag:hover {
            opacity: 1;
        }

        .multi-select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            max-height: 250px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            margin-top: 4px;
        }

        .multi-select-dropdown.show {
            display: block;
        }

        .multi-select-option {
            padding: 12px 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.2s;
        }

        .multi-select-option:hover {
            background: #f1f5f9;
        }

        .multi-select-option.selected {
            background: linear-gradient(135deg, #3b82f6, #667eea);
            color: white;
        }

        .multi-select-option .checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid #cbd5e1;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .multi-select-option.selected .checkbox {
            background: white;
            border-color: white;
            color: #3b82f6;
        }

        .multi-select-option .auditor-info {
            display: flex;
            flex-direction: column;
        }

        .multi-select-option .auditor-name {
            font-weight: 500;
        }

        .multi-select-option .auditor-role {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-box">
            <div class="spinner"></div>
            <p>Starting audit...</p>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🚀 Start New Receiving Audit</h1>
            <p>Fill in the audit details to begin</p>
        </div>

        <div class="main-card">
            <div class="card-header">
                <h2>📋 Audit Information</h2>
                <p>Please complete all required fields</p>
            </div>

            <div class="card-body">
                <form id="startAuditForm" onsubmit="startAudit(event)">
                    <!-- Store Selection -->
                    <div class="form-group">
                        <label>Store <span class="required">*</span></label>
                        <select id="storeSelect" required onchange="onStoreChange()">
                            <option value="">Select a store...</option>
                        </select>
                        <div class="store-info" id="storeInfo">
                            <div class="store-info-item">
                                <span class="label">Location:</span>
                                <span class="value" id="storeLocation">-</span>
                            </div>
                            <div class="store-info-item">
                                <span class="label">Template:</span>
                                <span class="schema-badge" id="storeSchema">-</span>
                            </div>
                            <div class="store-info-item" id="cycleInfoRow" style="display: none;">
                                <span class="label">Current Visit:</span>
                                <span class="cycle-badge" id="storeCycle">-</span>
                            </div>
                        </div>
                    </div>

                    <!-- Date and Time In/Out -->
                    <div class="form-group">
                        <label>Date of Audit <span class="required">*</span></label>
                        <input type="date" id="auditDate" required>
                    </div>
                    <div class="form-group">
                        <label>Time In <span class="required">*</span></label>
                        <input type="time" id="timeIn" required>
                    </div>

                    <!-- Auditors -->
                    <div class="form-group">
                        <label>Auditor(s) <span class="required">*</span></label>
                        <div class="multi-select-container" id="auditorContainer">
                            <div class="multi-select-trigger" id="auditorTrigger" tabindex="0">
                                <span class="placeholder">Select auditor(s)...</span>
                            </div>
                            <div class="multi-select-dropdown" id="auditorDropdown">
                                <!-- Options populated by JS -->
                            </div>
                        </div>
                        <input type="hidden" id="auditors" required>
                    </div>

                    <!-- Accompanied By -->
                    <div class="form-group">
                        <label>Accompanied By</label>
                        <input type="text" id="accompaniedBy" placeholder="Enter name of accompanying person (optional)">
                    </div>
                </form>
            </div>

            <div class="card-footer">
                <button type="submit" form="startAuditForm" class="btn btn-primary" id="startBtn">
                    <span>📝</span>
                    Start Filling Audit
                </button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='/receiving-audit'">
                    <span>←</span>
                    Back to Receiving Audit
                </button>
            </div>
        </div>
    </div>

    <script>
        let stores = [];
        let selectedStore = null;
        let auditors = [];
        let selectedAuditors = [];
        let currentUser = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await loadCurrentUser();
            loadStores();
            loadAuditors();
            setDefaultValues();
            initAuditorDropdown();
        });

        // Load current logged-in user
        async function loadCurrentUser() {
            try {
                const response = await fetch('/auth/session');
                if (response.ok) {
                    const data = await response.json();
                    currentUser = data.user;
                }
            } catch (error) {
                console.error('Error loading current user:', error);
            }
        }

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.className = `toast ${type} show`;

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Set default date and time
        function setDefaultValues() {
            const now = new Date();
            
            // Set today's date
            const dateStr = now.toISOString().split('T')[0];
            document.getElementById('auditDate').value = dateStr;
            
            // Set current time as Time In
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('timeIn').value = `${hours}:${minutes}`;
        }

        // Load auditors from API
        async function loadAuditors() {
            try {
                const response = await fetch('/receiving-audit/api/auditors');
                const result = await response.json();
                
                if (result.success) {
                    auditors = result.auditors;
                    renderAuditorOptions();
                    
                    // Pre-select current logged-in user if they are in the auditors list
                    if (currentUser) {
                        const matchingAuditor = auditors.find(a => 
                            a.Email?.toLowerCase() === currentUser.email?.toLowerCase() ||
                            a.DisplayName?.toLowerCase() === currentUser.displayName?.toLowerCase()
                        );
                        if (matchingAuditor) {
                            toggleAuditor(matchingAuditor);
                        }
                    }
                } else {
                    showToast('Failed to load auditors', 'error');
                }
            } catch (error) {
                console.error('Error loading auditors:', error);
                showToast('Error loading auditors', 'error');
            }
        }

        // Initialize auditor dropdown
        function initAuditorDropdown() {
            const trigger = document.getElementById('auditorTrigger');
            const dropdown = document.getElementById('auditorDropdown');

            // Toggle dropdown on click
            trigger.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdown.classList.toggle('show');
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!document.getElementById('auditorContainer').contains(e.target)) {
                    dropdown.classList.remove('show');
                }
            });

            // Keyboard navigation
            trigger.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    dropdown.classList.toggle('show');
                }
            });
        }

        // Render auditor options in dropdown
        function renderAuditorOptions() {
            const dropdown = document.getElementById('auditorDropdown');
            dropdown.innerHTML = '';

            auditors.forEach(auditor => {
                const isSelected = selectedAuditors.some(a => a.Id === auditor.Id);
                const option = document.createElement('div');
                option.className = `multi-select-option ${isSelected ? 'selected' : ''}`;
                option.innerHTML = `
                    <div class="checkbox">${isSelected ? '✓' : ''}</div>
                    <div class="auditor-info">
                        <span class="auditor-name">${auditor.DisplayName}</span>
                        <span class="auditor-role">${auditor.RoleName}</span>
                    </div>
                `;
                option.onclick = (e) => {
                    e.stopPropagation();
                    toggleAuditor(auditor);
                };
                dropdown.appendChild(option);
            });
        }

        // Toggle auditor selection
        function toggleAuditor(auditor) {
            const index = selectedAuditors.findIndex(a => a.Id === auditor.Id);
            
            if (index >= 0) {
                selectedAuditors.splice(index, 1);
            } else {
                selectedAuditors.push(auditor);
            }

            updateAuditorTrigger();
            renderAuditorOptions();
            updateAuditorsHiddenField();
        }

        // Update the trigger display to show selected auditors
        function updateAuditorTrigger() {
            const trigger = document.getElementById('auditorTrigger');
            
            if (selectedAuditors.length === 0) {
                trigger.innerHTML = '<span class="placeholder">Select auditor(s)...</span>';
            } else {
                trigger.innerHTML = selectedAuditors.map(auditor => `
                    <span class="selected-tag">
                        ${auditor.DisplayName}
                        <span class="remove-tag" onclick="event.stopPropagation(); removeAuditor(${auditor.Id})">×</span>
                    </span>
                `).join('');
            }
        }

        // Remove auditor from selection
        function removeAuditor(auditorId) {
            selectedAuditors = selectedAuditors.filter(a => a.Id !== auditorId);
            updateAuditorTrigger();
            renderAuditorOptions();
            updateAuditorsHiddenField();
        }

        // Update hidden field with auditor names
        function updateAuditorsHiddenField() {
            const hiddenField = document.getElementById('auditors');
            hiddenField.value = selectedAuditors.map(a => a.DisplayName).join(', ');
        }

        // Load stores from API
        async function loadStores() {
            try {
                const response = await fetch('/receiving-audit/api/stores');
                const result = await response.json();
                
                if (result.success) {
                    stores = result.data;
                    const select = document.getElementById('storeSelect');
                    
                    stores.forEach(store => {
                        const option = document.createElement('option');
                        option.value = store.storeId;
                        option.textContent = `${store.storeCode} - ${store.storeName}`;
                        select.appendChild(option);
                    });
                } else {
                    showToast('Failed to load stores', 'error');
                }
            } catch (error) {
                console.error('Error loading stores:', error);
                showToast('Error loading stores', 'error');
            }
        }

        // Handle store selection change
        async function onStoreChange() {
            const storeId = parseInt(document.getElementById('storeSelect').value);
            const storeInfo = document.getElementById('storeInfo');
            const cycleInfoRow = document.getElementById('cycleInfoRow');
            
            if (storeId) {
                selectedStore = stores.find(s => s.storeId === storeId);
                
                if (selectedStore) {
                    const loc = selectedStore.location || 'N/A';
                    const locEl = document.getElementById('storeLocation');
                    if (loc && (loc.includes('http') || loc.includes('maps.') || loc.includes('goo.gl'))) {
                        locEl.innerHTML = `<a href="${encodeURI(loc)}" target="_blank" rel="noopener noreferrer" style="color: #2563eb; text-decoration: none;">📍 View Map</a>`;
                    } else {
                        locEl.textContent = loc;
                    }
                    document.getElementById('storeSchema').textContent = selectedStore.templateName || 'Not assigned';
                    storeInfo.classList.add('show');
                    
                    // Fetch visit/cycle info for this store
                    try {
                        const cycleResponse = await fetch(`/receiving-audit/api/cycle/store/${storeId}`);
                        const cycleResult = await cycleResponse.json();
                        
                        if (cycleResult.success) {
                            const data = cycleResult.data;
                            const visitText = `Visit #${data.currentCycle}`;
                            const statusText = data.isPendingInCurrentCycle ? ' (Pending)' : ' (Done)';
                            const auditCountText = ` - ${data.storeAuditCount} visit${data.storeAuditCount !== 1 ? 's' : ''} completed`;
                            
                            const cycleBadge = document.getElementById('storeCycle');
                            cycleBadge.textContent = visitText + statusText + auditCountText;
                            cycleBadge.className = 'cycle-badge ' + (data.isPendingInCurrentCycle ? 'pending' : 'completed');
                            cycleInfoRow.style.display = 'flex';
                        }
                    } catch (error) {
                        console.error('Error fetching visit info:', error);
                        cycleInfoRow.style.display = 'none';
                    }
                }
            } else {
                selectedStore = null;
                storeInfo.classList.remove('show');
                cycleInfoRow.style.display = 'none';
            }
        }

        // Start audit
        async function startAudit(e) {
            e.preventDefault();
            
            if (!selectedStore) {
                showToast('Please select a store', 'error');
                return;
            }

            if (selectedAuditors.length === 0) {
                showToast('Please select at least one auditor', 'error');
                return;
            }

            const auditData = {
                storeId: selectedStore.storeId,
                storeCode: selectedStore.storeCode,
                storeName: selectedStore.storeName,
                schemaId: selectedStore.schemaId,
                schemaName: selectedStore.schemaName,
                auditDate: document.getElementById('auditDate').value,
                timeIn: document.getElementById('timeIn').value,
                auditors: document.getElementById('auditors').value,
                accompaniedBy: document.getElementById('accompaniedBy').value
            };

            // Show loading
            document.getElementById('loadingOverlay').classList.add('show');
            document.getElementById('startBtn').disabled = true;

            try {
                // First get the next document number
                const docResponse = await fetch('/receiving-audit/api/next-document-number');
                const docResult = await docResponse.json();
                
                if (!docResult.success) {
                    throw new Error('Failed to generate document number');
                }
                
                const inspectionData = {
                    storeId: selectedStore.storeId,
                    storeName: selectedStore.storeName,
                    documentNumber: docResult.documentNumber,
                    inspectionDate: document.getElementById('auditDate').value,
                    timeIn: document.getElementById('timeIn').value,
                    inspectors: document.getElementById('auditors').value,
                    accompaniedBy: document.getElementById('accompaniedBy').value,
                    templateId: selectedStore.templateId || null
                };
                
                const response = await fetch('/receiving-audit/api/inspections', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(inspectionData)
                });

                const result = await response.json();

                if (result.success) {
                    showToast('Audit created successfully!', 'success');
                    // Redirect to audit filling page with the ID
                    setTimeout(() => {
                        window.location.href = `/receiving-audit/fill/${result.data.id}`;
                    }, 1000);
                } else {
                    throw new Error(result.error || 'Failed to start audit');
                }
            } catch (error) {
                console.error('Error starting audit:', error);
                showToast('Error: ' + error.message, 'error');
                document.getElementById('loadingOverlay').classList.remove('show');
                document.getElementById('startBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
